<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Omnix</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --color-primary: #4d9fff;
      --color-primary-dark: #3a7fd9;
      --color-secondary: #9b5de5;
      --color-gradient: linear-gradient(135deg, #4d9fff, #9b5de5);
      --color-dark: #0d0d1e;
      --color-dark-light: #161630;
      --color-white: #ffffff;
      --color-text: #dde0f0;
      --color-text-muted: #8888bb;
      --color-border: #2a2a50;
      --font-heading: 'Montserrat', sans-serif;
      --font-body: 'Inter', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      color: var(--color-text);
      background-color: var(--color-dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ===== HEADER ===== */
    header {
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid var(--color-border);
    }
    .logo { display: flex; align-items: center; gap: 0.5rem; text-decoration: none; }
    .logo img.logo-icon { height: 48px; width: auto; }
    .logo img.logo-name  { height: 22px; width: auto; margin-left: 6px; }

    /* ===== MAIN ===== */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      background: radial-gradient(ellipse at top, #1a1040 0%, var(--color-dark) 65%);
    }

    .login-card {
      background-color: var(--color-dark-light);
      border: 1px solid var(--color-border);
      border-radius: 20px;
      padding: 2.75rem 2.5rem;
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .login-card h1 {
      font-family: var(--font-heading);
      font-size: 1.9rem;
      font-weight: 800;
      color: var(--color-white);
      margin-bottom: 0.5rem;
    }
    .login-card h1 span {
      background: var(--color-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .login-card p {
      color: var(--color-text-muted);
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }

    /* ===== AUTH BUTTONS ===== */
    .auth-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      width: 100%;
      padding: 0.875rem 1.5rem;
      border-radius: 10px;
      font-size: 0.97rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
      border: none;
      margin-bottom: 0.875rem;
      text-decoration: none;
    }
    .auth-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
    .auth-btn:active { transform: translateY(0); }

    .btn-google {
      background-color: #ffffff;
      color: #1f1f1f;
    }
    .btn-google img { width: 20px; height: 20px; }

    .btn-apple {
      background-color: #000000;
      color: #ffffff;
      border: 1px solid #333;
    }
    .btn-apple i { font-size: 1.1rem; }

    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
      color: var(--color-text-muted);
      font-size: 0.82rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--color-border);
    }

    /* ===== EMAIL FORM ===== */
    .email-form { text-align: left; }
    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--color-text-muted);
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .form-group input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--color-dark);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      color: var(--color-white);
      font-size: 0.95rem;
      font-family: var(--font-body);
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: var(--color-primary); }
    .form-group input::placeholder { color: var(--color-text-muted); }

    .btn-email {
      width: 100%;
      padding: 0.875rem;
      background: var(--color-gradient);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.97rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: opacity 0.2s, transform 0.15s;
      font-family: var(--font-body);
    }
    .btn-email:hover { opacity: 0.88; transform: translateY(-2px); }

    /* ===== TOGGLE ===== */
    .toggle-mode {
      margin-top: 1.5rem;
      font-size: 0.88rem;
      color: var(--color-text-muted);
    }
    .toggle-mode a {
      color: var(--color-primary);
      text-decoration: none;
      font-weight: 600;
    }
    .toggle-mode a:hover { text-decoration: underline; }

    /* ===== ERROR / STATUS ===== */
    .auth-message {
      display: none;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.88rem;
      margin-bottom: 1rem;
      text-align: left;
    }
    .auth-message.error { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
    .auth-message.success { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: #86efac; }
    .auth-message.show { display: block; }

    /* ===== LOADING SPINNER ===== */
    .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== FOOTER ===== */
    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.8rem;
      color: var(--color-text-muted);
      border-top: 1px solid var(--color-border);
    }
    footer a { color: var(--color-text-muted); text-decoration: none; }
    footer a:hover { color: var(--color-primary); }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="logo">
      <img src="Omnix-logo-only.png" alt="Omnix" class="logo-icon">
      <img src="Omnix-name-only.png" alt="Omnix" class="logo-name">
    </a>
  </header>

  <main>
    <div class="login-card">

      <h1>Welcome to <span>Omnix</span></h1>
      <p id="card-subtitle">Sign in to access your dashboard</p>

      <div class="auth-message" id="auth-message"></div>

      <!-- Google -->
      <button class="auth-btn btn-google" id="btn-google" onclick="signInWithGoogle()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
        Continue with Google
      </button>

      <!-- Apple -->
      <button class="auth-btn btn-apple" id="btn-apple" onclick="signInWithApple()">
        <i class="fab fa-apple"></i>
        Continue with Apple
      </button>

      <div class="divider">or</div>

      <!-- Email form -->
      <form class="email-form" id="email-form" onsubmit="handleEmailAuth(event)">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group" id="name-group" style="display:none;">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="Your name">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required minlength="6">
        </div>
        <button type="submit" class="btn-email" id="btn-email-submit">
          Sign In
        </button>
      </form>

      <div class="toggle-mode" id="toggle-mode">
        Don't have an account? <a href="#" onclick="toggleMode(event)">Create one</a>
      </div>

    </div>
  </main>

  <footer>
    <a href="index.html">← Back to Omnix</a> &nbsp;·&nbsp;
    <a href="#">Privacy Policy</a> &nbsp;·&nbsp;
    <a href="#">Terms of Service</a>
  </footer>

  <!-- ===== FIREBASE ===== -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

  <script>
    // ─────────────────────────────────────────
    //  PASTE YOUR FIREBASE CONFIG HERE
    //  Get it from: Firebase Console → Project Settings → Your Apps
    // ─────────────────────────────────────────
    const firebaseConfig = {
      apiKey:            "REPLACE_WITH_YOUR_API_KEY",
      authDomain:        "REPLACE_WITH_YOUR_PROJECT_ID.firebaseapp.com",
      projectId:         "REPLACE_WITH_YOUR_PROJECT_ID",
      storageBucket:     "REPLACE_WITH_YOUR_PROJECT_ID.appspot.com",
      messagingSenderId: "REPLACE_WITH_YOUR_MESSAGING_SENDER_ID",
      appId:             "REPLACE_WITH_YOUR_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // ─────────────────────────────────────────
    //  STATE
    // ─────────────────────────────────────────
    let isSignUp = false;

    // Redirect if already logged in
    auth.onAuthStateChanged(user => {
      if (user) window.location.href = 'dashboard.html';
    });

    // ─────────────────────────────────────────
    //  GOOGLE SIGN IN
    // ─────────────────────────────────────────
    function signInWithGoogle() {
      clearMessage();
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider)
        .then(() => window.location.href = 'dashboard.html')
        .catch(err => showMessage(err.message, 'error'));
    }

    // ─────────────────────────────────────────
    //  APPLE SIGN IN
    // ─────────────────────────────────────────
    function signInWithApple() {
      clearMessage();
      const provider = new firebase.auth.OAuthProvider('apple.com');
      provider.addScope('email');
      provider.addScope('name');
      auth.signInWithPopup(provider)
        .then(() => window.location.href = 'dashboard.html')
        .catch(err => showMessage(err.message, 'error'));
    }

    // ─────────────────────────────────────────
    //  EMAIL / PASSWORD
    // ─────────────────────────────────────────
    function handleEmailAuth(e) {
      e.preventDefault();
      clearMessage();
      const email    = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const name     = document.getElementById('name').value;

      if (isSignUp) {
        auth.createUserWithEmailAndPassword(email, password)
          .then(cred => {
            if (name) return cred.user.updateProfile({ displayName: name });
          })
          .then(() => window.location.href = 'dashboard.html')
          .catch(err => showMessage(friendlyError(err.code), 'error'));
      } else {
        auth.signInWithEmailAndPassword(email, password)
          .then(() => window.location.href = 'dashboard.html')
          .catch(err => showMessage(friendlyError(err.code), 'error'));
      }
    }

    // ─────────────────────────────────────────
    //  TOGGLE SIGN IN ↔ SIGN UP
    // ─────────────────────────────────────────
    function toggleMode(e) {
      e.preventDefault();
      isSignUp = !isSignUp;
      clearMessage();
      document.getElementById('card-subtitle').textContent =
        isSignUp ? 'Create your free Omnix account' : 'Sign in to access your dashboard';
      document.getElementById('btn-email-submit').textContent =
        isSignUp ? 'Create Account' : 'Sign In';
      document.getElementById('name-group').style.display =
        isSignUp ? 'block' : 'none';
      document.getElementById('toggle-mode').innerHTML =
        isSignUp
          ? 'Already have an account? <a href="#" onclick="toggleMode(event)">Sign in</a>'
          : 'Don\'t have an account? <a href="#" onclick="toggleMode(event)">Create one</a>';
    }

    // ─────────────────────────────────────────
    //  HELPERS
    // ─────────────────────────────────────────
    function showMessage(msg, type) {
      const el = document.getElementById('auth-message');
      el.textContent = msg;
      el.className = 'auth-message show ' + type;
    }
    function clearMessage() {
      const el = document.getElementById('auth-message');
      el.className = 'auth-message';
    }
    function friendlyError(code) {
      const map = {
        'auth/user-not-found':       'No account found with that email.',
        'auth/wrong-password':       'Incorrect password. Please try again.',
        'auth/email-already-in-use': 'An account with this email already exists.',
        'auth/weak-password':        'Password must be at least 6 characters.',
        'auth/invalid-email':        'Please enter a valid email address.',
        'auth/too-many-requests':    'Too many attempts. Please try again later.',
        'auth/popup-closed-by-user': 'Sign-in cancelled.',
      };
      return map[code] || 'Something went wrong. Please try again.';
    }
  </script>

</body>
</html>
