<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <filter id="zs"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#00000077"/></filter>
    <linearGradient id="zg1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#37474F"/>
      <stop offset="100%" style="stop-color:#1C313A"/>
    </linearGradient>
    <clipPath id="zpent">
      <polygon points="100,12 188,78 158,188 42,188 12,78"/>
    </clipPath>
  </defs>
  <!-- Pentagon -->
  <polygon points="100,12 188,78 158,188 42,188 12,78" fill="url(#zg1)" filter="url(#zs)"/>
  <!-- Shingle rows clipped -->
  <g clip-path="url(#zpent)" opacity="0.18">
    <g fill="#90A4AE">
      <rect x="12" y="78" width="44" height="14" rx="2"/>
      <rect x="58" y="78" width="44" height="14" rx="2"/>
      <rect x="104" y="78" width="44" height="14" rx="2"/>
      <rect x="150" y="78" width="38" height="14" rx="2"/>
      <rect x="12" y="95" width="44" height="14" rx="2"/>
      <rect x="58" y="95" width="44" height="14" rx="2"/>
      <rect x="104" y="95" width="44" height="14" rx="2"/>
      <rect x="150" y="95" width="38" height="14" rx="2"/>
      <rect x="12" y="112" width="44" height="14" rx="2"/>
      <rect x="58" y="112" width="44" height="14" rx="2"/>
      <rect x="104" y="112" width="44" height="14" rx="2"/>
      <rect x="150" y="112" width="38" height="14" rx="2"/>
    </g>
  </g>
  <!-- Roof peak icon -->
  <polyline points="42,78 100,30 158,78" fill="none" stroke="#4FC3F7" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>
  <polyline points="56,78 100,42 144,78" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Border -->
  <polygon points="100,12 188,78 158,188 42,188 12,78" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <!-- Text -->
  <text x="100" y="126" font-family="Arial Black,sans-serif" font-size="26" font-weight="900" fill="white" text-anchor="middle" letter-spacing="1">SUMMIT</text>
  <line x1="42" y1="135" x2="158" y2="135" stroke="#4FC3F7" stroke-width="2"/>
  <text x="100" y="152" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#B0BEC5" text-anchor="middle" letter-spacing="2">ROOFING CO.</text>
  <text x="100" y="170" font-family="Arial,sans-serif" font-size="10" font-weight="400" fill="#78909C" text-anchor="middle" letter-spacing="1">EST. 2008</text>
</svg>