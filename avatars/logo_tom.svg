<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <filter id="ts"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#00000077"/></filter>
    <linearGradient id="tg1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1A237E"/>
      <stop offset="100%" style="stop-color:#0D1642"/>
    </linearGradient>
  </defs>
  <!-- Square -->
  <rect x="12" y="12" width="176" height="176" rx="16" fill="url(#tg1)" filter="url(#ts)"/>
  <!-- Gold diagonal accent -->
  <rect x="12" y="85" width="176" height="30" fill="#C8972A" opacity="0.15"/>
  <line x1="12" y1="85" x2="188" y2="85" stroke="#C8972A" stroke-width="2.5"/>
  <line x1="12" y1="115" x2="188" y2="115" stroke="#C8972A" stroke-width="2.5"/>
  <!-- Tape measure icon -->
  <rect x="68" y="32" width="64" height="44" rx="10" fill="#C8972A" opacity="0.9"/>
  <rect x="74" y="38" width="52" height="32" rx="7" fill="#E6B53A"/>
  <!-- Tape band -->
  <rect x="74" y="50" width="52" height="8" rx="2" fill="#FFF9C4" opacity="0.9"/>
  <text x="100" y="58" font-family="Arial,sans-serif" font-size="7" fill="#C8972A" text-anchor="middle" font-weight="700">MEASURE TWICE</text>
  <!-- Pull tab -->
  <rect x="120" y="52" width="16" height="4" rx="2" fill="#C8972A"/>
  <!-- Main text in gold band area -->
  <text x="100" y="104" font-family="Arial Black,sans-serif" font-size="18" font-weight="900" fill="#C8972A" text-anchor="middle" letter-spacing="2">CRAFTSMAN</text>
  <!-- Sub text -->
  <text x="100" y="133" font-family="Arial Black,sans-serif" font-size="15" font-weight="900" fill="white" text-anchor="middle" letter-spacing="1">BUILD CO.</text>
  <text x="100" y="157" font-family="Arial,sans-serif" font-size="10" fill="#7986CB" text-anchor="middle" letter-spacing="1.5">LICENSED &amp; INSURED</text>
  <!-- Outer border -->
  <rect x="12" y="12" width="176" height="176" rx="16" fill="none" stroke="#C8972A" stroke-width="2" opacity="0.4"/>
</svg>