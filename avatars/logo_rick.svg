<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <filter id="rs"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#00000077"/></filter>
    <linearGradient id="rg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6D4C41"/>
      <stop offset="100%" style="stop-color:#3E2723"/>
    </linearGradient>
    <clipPath id="rhex">
      <polygon points="100,14 178,57 178,143 100,186 22,143 22,57"/>
    </clipPath>
  </defs>
  <!-- Hexagon -->
  <polygon points="100,14 178,57 178,143 100,186 22,143 22,57" fill="url(#rg1)" filter="url(#rs)"/>
  <!-- Wood grain texture inside hex -->
  <g clip-path="url(#rhex)" opacity="0.35">
    <rect x="22" y="14" width="156" height="22" fill="#8D6E63"/>
    <rect x="22" y="46" width="156" height="18" fill="#795548"/>
    <rect x="22" y="74" width="156" height="20" fill="#8D6E63"/>
    <rect x="22" y="104" width="156" height="18" fill="#6D4C41"/>
    <rect x="22" y="132" width="156" height="22" fill="#8D6E63"/>
    <rect x="22" y="164" width="156" height="22" fill="#795548"/>
    <!-- grain curves -->
    <path d="M22,30 Q70,26 100,30 Q130,34 178,30" fill="none" stroke="#5D4037" stroke-width="1" opacity="0.5"/>
    <path d="M22,60 Q80,54 100,60 Q120,66 178,60" fill="none" stroke="#4E342E" stroke-width="1" opacity="0.5"/>
    <path d="M22,90 Q60,84 100,90 Q140,96 178,90" fill="none" stroke="#5D4037" stroke-width="1" opacity="0.5"/>
    <path d="M22,120 Q70,114 100,120 Q130,126 178,120" fill="none" stroke="#4E342E" stroke-width="1" opacity="0.5"/>
    <path d="M22,150 Q80,144 100,150 Q120,156 178,150" fill="none" stroke="#5D4037" stroke-width="1" opacity="0.5"/>
  </g>
  <!-- Hex border -->
  <polygon points="100,14 178,57 178,143 100,186 22,143 22,57" fill="none" stroke="#BCAAA4" stroke-width="3"/>
  <!-- RF Monogram -->
  <text x="100" y="118" font-family="Georgia,serif" font-size="72" font-weight="700" fill="#EFEBE9" text-anchor="middle" opacity="0.95">RF</text>
  <!-- Underline + tagline -->
  <line x1="58" y1="128" x2="142" y2="128" stroke="#BCAAA4" stroke-width="2"/>
  <text x="100" y="146" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#D7CCC8" text-anchor="middle" letter-spacing="2.5">FLOORING</text>
</svg>