<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <filter id="ss"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#00000077"/></filter>
    <clipPath id="sdiam"><polygon points="100,8 192,100 100,192 8,100"/></clipPath>
  </defs>
  <!-- Diamond background -->
  <polygon points="100,8 192,100 100,192 8,100" fill="#8D3B2B" filter="url(#ss)"/>
  <!-- Tile grid clipped to diamond -->
  <g clip-path="url(#sdiam)">
    <g fill="#C1440E">
      <rect x="8" y="8" width="46" height="46" rx="1"/>
      <rect x="58" y="8" width="46" height="46" rx="1"/>
      <rect x="108" y="8" width="46" height="46" rx="1"/>
      <rect x="158" y="8" width="46" height="46" rx="1"/>
      <rect x="8" y="58" width="46" height="46" rx="1"/>
      <rect x="58" y="58" width="46" height="46" rx="1"/>
      <rect x="108" y="58" width="46" height="46" rx="1"/>
      <rect x="158" y="58" width="46" height="46" rx="1"/>
      <rect x="8" y="108" width="46" height="46" rx="1"/>
      <rect x="58" y="108" width="46" height="46" rx="1"/>
      <rect x="108" y="108" width="46" height="46" rx="1"/>
      <rect x="158" y="108" width="46" height="46" rx="1"/>
      <rect x="8" y="158" width="46" height="46" rx="1"/>
      <rect x="58" y="158" width="46" height="46" rx="1"/>
      <rect x="108" y="158" width="46" height="46" rx="1"/>
      <rect x="158" y="158" width="46" height="46" rx="1"/>
    </g>
    <!-- Grout lines -->
    <line x1="8" y1="55" x2="192" y2="55" stroke="#8D3B2B" stroke-width="5"/>
    <line x1="8" y1="105" x2="192" y2="105" stroke="#8D3B2B" stroke-width="5"/>
    <line x1="8" y1="155" x2="192" y2="155" stroke="#8D3B2B" stroke-width="5"/>
    <line x1="55" y1="8" x2="55" y2="192" stroke="#8D3B2B" stroke-width="5"/>
    <line x1="105" y1="8" x2="105" y2="192" stroke="#8D3B2B" stroke-width="5"/>
    <line x1="155" y1="8" x2="155" y2="192" stroke="#8D3B2B" stroke-width="5"/>
    <!-- Dark overlay in center for text readability -->
    <polygon points="100,46 154,100 100,154 46,100" fill="#5D1A0E" opacity="0.85"/>
  </g>
  <!-- Diamond border -->
  <polygon points="100,8 192,100 100,192 8,100" fill="none" stroke="#F5CBA7" stroke-width="3"/>
  <!-- Text -->
  <text x="100" y="90" font-family="Arial Black,sans-serif" font-size="19" font-weight="900" fill="#F5CBA7" text-anchor="middle" letter-spacing="1">SOLETECH</text>
  <text x="100" y="112" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#FFCCBC" text-anchor="middle" letter-spacing="1">FLOORING</text>
</svg>