<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <filter id="tms"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#00000055"/></filter>
  </defs>
  <!-- White circle -->
  <circle cx="100" cy="100" r="92" fill="white" filter="url(#tms)"/>
  <!-- Colorful paint arc border segments -->
  <circle cx="100" cy="100" r="86" fill="none" stroke="#E53935" stroke-width="12" stroke-dasharray="80 452" stroke-dashoffset="0"/>
  <circle cx="100" cy="100" r="86" fill="none" stroke="#FB8C00" stroke-width="12" stroke-dasharray="70 452" stroke-dashoffset="-85"/>
  <circle cx="100" cy="100" r="86" fill="none" stroke="#FDD835" stroke-width="12" stroke-dasharray="65 452" stroke-dashoffset="-160"/>
  <circle cx="100" cy="100" r="86" fill="none" stroke="#43A047" stroke-width="12" stroke-dasharray="75 452" stroke-dashoffset="-230"/>
  <circle cx="100" cy="100" r="86" fill="none" stroke="#1E88E5" stroke-width="12" stroke-dasharray="70 452" stroke-dashoffset="-310"/>
  <circle cx="100" cy="100" r="86" fill="none" stroke="#8E24AA" stroke-width="12" stroke-dasharray="60 452" stroke-dashoffset="-385"/>
  <!-- Inner white mask for clean edge -->
  <circle cx="100" cy="100" r="80" fill="white"/>
  <!-- Paintbrush icon - simple, clean -->
  <rect x="93" y="32" width="14" height="52" rx="4" fill="#5D4037"/>
  <rect x="89" y="78" width="22" height="8" rx="2" fill="#9E9E9E"/>
  <ellipse cx="100" cy="94" rx="11" ry="16" fill="#1565C0"/>
  <ellipse cx="100" cy="102" rx="8" ry="10" fill="#1976D2"/>
  <ellipse cx="100" cy="108" rx="5" ry="6" fill="#42A5F5"/>
  <!-- Text -->
  <text x="100" y="144" font-family="Arial Black,sans-serif" font-size="21" font-weight="900" fill="#1A1A1A" text-anchor="middle">TOMMY'S</text>
  <text x="100" y="163" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#555" text-anchor="middle" letter-spacing="2">PAINTING</text>
</svg>