<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="g9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a3d4a"/>
      <stop offset="100%" style="stop-color:#0e7f8f"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#g9)"/>
  <!-- Snowflake arms (6) -->
  <g stroke="#7ee8f5" stroke-width="8" stroke-linecap="round">
    <line x1="100" y1="36" x2="100" y2="164"/>
    <line x1="100" y1="36" x2="100" y2="164" transform="rotate(60 100 100)"/>
    <line x1="100" y1="36" x2="100" y2="164" transform="rotate(120 100 100)"/>
  </g>
  <!-- Snowflake cross-bars -->
  <g stroke="#7ee8f5" stroke-width="5" stroke-linecap="round">
    <line x1="80" y1="56" x2="100" y2="68"/><line x1="120" y1="56" x2="100" y2="68"/>
    <line x1="80" y1="56" x2="100" y2="68" transform="rotate(60 100 100)"/>
    <line x1="120" y1="56" x2="100" y2="68" transform="rotate(60 100 100)"/>
    <line x1="80" y1="56" x2="100" y2="68" transform="rotate(120 100 100)"/>
    <line x1="120" y1="56" x2="100" y2="68" transform="rotate(120 100 100)"/>
    <line x1="80" y1="144" x2="100" y2="132"/><line x1="120" y1="144" x2="100" y2="132"/>
    <line x1="80" y1="144" x2="100" y2="132" transform="rotate(60 100 100)"/>
    <line x1="120" y1="144" x2="100" y2="132" transform="rotate(60 100 100)"/>
    <line x1="80" y1="144" x2="100" y2="132" transform="rotate(120 100 100)"/>
    <line x1="120" y1="144" x2="100" y2="132" transform="rotate(120 100 100)"/>
  </g>
  <!-- Center circle -->
  <circle cx="100" cy="100" r="16" fill="#0e7f8f" stroke="#7ee8f5" stroke-width="4"/>
  <circle cx="100" cy="100" r="8" fill="#7ee8f5"/>
</svg>